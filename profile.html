<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
        <title>Profil - IMAG'IN</title>
        <link href="bootstrap_theme/bootstrap.css" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            :root {
                --bs-primary: #F58D2A;
                --bs-secondary: #3384D9;
            }
            .btn-primary {
                background-color: var(--bs-primary);
                border-color: var(--bs-primary);
            }
            .btn-primary:hover {
                background-color: #e57d1a;
                border-color: #e57d1a;
            }
            .text-primary {
                color: var(--bs-primary) !important;
            }
            .bg-primary {
                background-color: var(--bs-primary) !important;
            }
            .btn-secondary {
                background-color: var(--bs-secondary);
                border-color: var(--bs-secondary);
            }
            .btn-secondary:hover {
                background-color: #2b73c0;
                border-color: #2b73c0;
            }
            .text-secondary {
                color: var(--bs-secondary) !important;
            }
            .bg-secondary {
                background-color: var(--bs-secondary) !important;
            }
        </style>
    </head>
    <body>
        <!-- Header Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <img alt="IMAG'IN" width="40" src="assets/img/logo/1%20png@4x.png">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <form class="d-flex mx-auto" style="width: 50%;">
                        <div class="input-group">
                            <input type="search" class="form-control" placeholder="Rechercher des images...">
                            <button class="btn btn-primary" type="submit">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </form>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/explore.html">Explorer</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/photographers.html">Photographes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/pricing.html">Tarifs</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                                <img src="https://ui-avatars.com/api/?name=a" alt="User" width="30" class="rounded-circle">
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="/profile.html"><i class="fas fa-user me-2"></i>Mon profil</a></li>
                                <li><a class="dropdown-item" href="/settings.html"><i class="fas fa-cog me-2"></i>Paramètres</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="/logout.html"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Profile Section -->
        <section class="text-white text-center py-5" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/img/background/fond-bleu.jpg'); background-size: cover; background-position: center;">
            <div class="container">
                <div class="mb-3 position-relative d-inline-block">
                    <img class="rounded-circle border border-3 border-white" src="https://ui-avatars.com/api/?name=a&size=128" alt="User" width="128">
                    <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0" title="Modifier la photo">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>
                <h2 class="mb-1">John Doe</h2>
                <p class="text-light mb-3">john.doe@example.com</p>
                <div class="d-flex justify-content-center gap-2">
                    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                        <i class="fas fa-edit me-2"></i>Modifier le profil
                    </button>
                    <button class="btn btn-outline-light">
                        <i class="fas fa-share-alt me-2"></i>Partager
                    </button>
                </div>
            </div>
        </section>

        <!-- Navigation Tabs -->
        <section class="container my-4">
            <ul class="nav nav-pills nav-fill" id="profileTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="downloads-tab" data-bs-toggle="tab" data-bs-target="#downloads" type="button">
                        <i class="fas fa-download me-2"></i>Téléchargements
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="favorites-tab" data-bs-toggle="tab" data-bs-target="#favorites" type="button">
                        <i class="fas fa-heart me-2"></i>Favoris
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="collections-tab" data-bs-toggle="tab" data-bs-target="#collections" type="button">
                        <i class="fas fa-folder me-2"></i>Collections
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button">
                        <i class="fas fa-history me-2"></i>Historique
                    </button>
                </li>
            </ul>
        </section>

        <!-- Tab Content -->
        <section class="container mb-5">
            <div class="tab-content" id="profileTabsContent">
                <!-- Downloads Tab -->
                <div class="tab-pane fade show active" id="downloads" role="tabpanel">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="d-flex gap-3">
                            <select class="form-select">
                                <option selected>Tous les types</option>
                                <option>Photos</option>
                                <option>Vecteurs</option>
                                <option>Illustrations</option>
                            </select>
                            <select class="form-select">
                                <option selected>Plus récent</option>
                                <option>Plus ancien</option>
                                <option>Plus populaire</option>
                            </select>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="btn-group" role="group">
                                <button type="button" class="btn btn-outline-secondary active">
                                    <i class="fas fa-th-large"></i>
                                </button>
                                <button type="button" class="btn btn-outline-secondary">
                                    <i class="fas fa-list"></i>
                                </button>
                            </div>
                            <span class="text-muted">Total: 24 images</span>
                        </div>
                    </div>

                    <div class="row row-cols-2 row-cols-md-4 g-4">
                        <!-- Image Cards -->
                        <div class="col">
                            <div class="card h-100 border-0 shadow-sm">
                                <div class="position-relative">
                                    <img src="assets/img/background/fond-bleu.jpg" alt="Image" class="card-img-top">
                                    <div class="position-absolute top-0 end-0 p-2">
                                        <button class="btn btn-light btn-sm rounded-circle">
                                            <i class="fas fa-heart"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <h6 class="card-title">Image Title</h6>
                                    <p class="card-text small text-muted">Téléchargée le 01/01/2024</p>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="badge bg-primary">HD</span>
                                        <button class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-download me-1"></i>Télécharger
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Repeat for other images -->
                    </div>

                    <div class="text-center mt-4">
                        <button class="btn btn-primary">
                            <i class="fas fa-plus me-2"></i>Voir plus
                        </button>
                    </div>
                </div>

                <!-- Other tabs content -->
                <div class="tab-pane fade" id="favorites" role="tabpanel">
                    <!-- Similar structure as downloads -->
                </div>
                <div class="tab-pane fade" id="collections" role="tabpanel">
                    <!-- Collections content -->
                </div>
                <div class="tab-pane fade" id="history" role="tabpanel">
                    <!-- History content -->
                </div>
            </div>
        </section>

        <!-- Edit Profile Modal -->
        <div class="modal fade" id="editProfileModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Modifier le profil</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Photo de profil</label>
                                <input type="file" class="form-control" accept="image/*">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nom</label>
                                <input type="text" class="form-control" value="John">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Prénom</label>
                                <input type="text" class="form-control" value="Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" value="john.doe@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Téléphone</label>
                                <input type="tel" class="form-control" value="+225 07 07 07 07 07">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="button" class="btn btn-primary">Enregistrer</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-dark text-light py-4">
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <p class="mb-0">&copy; 2024 IMAG'IN. Tous droits réservés.</p>
                    </div>
                    <div class="col-md-6 text-end">
                        <a href="/terms.html" class="text-light me-3">Conditions d'utilisation</a>
                        <a href="/privacy.html" class="text-light">Politique de confidentialité</a>
                    </div>
                </div>
            </div>
        </footer>

        <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    </body>
</html>
