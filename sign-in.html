<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
        <title>Page de création de compte</title>
        <link href="bootstrap_theme/bootstrap.css" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="assets/css/sign-in.css">
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <!-- Section de gauche -->
                <div class="col-md-6 left-section d-flex flex-column justify-content-center align-items-center text-white">
                    <h1 class="display-5">LOREM IPSUM DOLOR</h1>
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing</p>
                </div>
                <!-- Section de droite avec le formulaire -->
                <div class="col-md-6 d-flex justify-content-center align-items-center">
                    <div class="form-container bg-white p-5 my-4 shadow">
                        <div class="text-center mb-4"><a href="/"><img src="assets/img/logo/1%20png@4x.png" alt="Logo Imagin" class="img-fluid mb-1" style="width: 75px;"></a>
                            <h2>Créez un compte</h2>
                        </div>
                        <form>
                            <div class="row mb-3">
                                <div class="col">
                                    <input type="text" class="form-control" placeholder="Nom" required="">
                                </div>
                                <div class="col">
                                    <input type="text" class="form-control" placeholder="Prénom" required="">
                                </div>
                            </div>
                            <div class="mb-3">
                                <select class="form-select" required="">
                                    <option selected="">Type de compagnie</option>
                                    <option value="1">Option 1</option>
                                    <option value="2">Option 2</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" placeholder="Nom de la compagnie" required="">
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" placeholder="Email" required="">
                            </div>
                            <div class="mb-3">
                                <input type="tel" class="form-control" placeholder="Téléphone" required="">
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" placeholder="Mot de passe" required="">
                            </div>
                            <div class="d-flex justify-content-between mb-3">
                                <a href="#" class="text-decoration-none">Mot de passe oublié ?</a>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Lorem ipsum</button>
                            <div class="text-center mt-3">
                                <small>Pas de compte ? <a href="#" class="text-decoration-none">Créer un compte</a></small>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    </body>
</html>
